# =============================================================================
# tmux key bindings (sourced from tmux.conf)
# =============================================================================
# All `bind`/`unbind` lives here so the main conf stays focused on options.

# Send prefix through to nested tmux
unbind C-b
bind C-Space send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# -----------------------------------------------------------------------------
# Splits
# -----------------------------------------------------------------------------

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# Pane navigation
# -----------------------------------------------------------------------------

# Vim-style (prefix-based fallback)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Smart navigation shared with vim-tmux-navigator
# Detects if Neovim is running and forwards C-h/j/k/l to it;
# otherwise moves between tmux panes directly.
# In a hub session the outer pane runs mosh (not vim), so the is_vim check
# would wrongly fall through to select-pane and swallow the key. Forward the
# raw chord to the inner tmux instead, which runs its own is_vim check against
# archie's real nvim pane.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind -n C-h if-shell -F '#{@hub}' { send-keys C-h } { if-shell "$is_vim" { send-keys C-h } { select-pane -L } }
bind -n C-j if-shell -F '#{@hub}' { send-keys C-j } { if-shell "$is_vim" { send-keys C-j } { select-pane -D } }
bind -n C-k if-shell -F '#{@hub}' { send-keys C-k } { if-shell "$is_vim" { send-keys C-k } { select-pane -U } }
bind -n C-l if-shell -F '#{@hub}' { send-keys C-l } { if-shell "$is_vim" { send-keys C-l } { select-pane -R } }

# Clear screen workaround (C-l is taken by navigator)
bind C-l send-keys C-l

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -----------------------------------------------------------------------------
# Windows & sessions
# -----------------------------------------------------------------------------

bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

bind ( switch-client -p
bind ) switch-client -n

# Session / project picker popup (fzf). Always HOME — only the mac reaches both
# machines. (prefix f and a are the two keys that stay home in a hub.)
bind f display-popup -E -w 60% -h 60% \
       "$HOME/code/seabbs/dotfiles/scripts/sessionizer.sh"

# Window switcher for the CURRENT session, cross-host, ranked by last activity
# (distinct from prefix f, which launches/picks a project). Jumps straight to
# the sessionizer's window step. Forwards to archie's own switcher in a hub, so
# it always lists the windows of whatever session you are actually looking at.
# run-shell (not display-popup directly) because only run-shell reliably
# format-expands #{session_name} against the invoking client; a popup cannot
# resolve its own launching session. --switch-popup then opens the popup with
# that session baked in.
bind s if-shell -F '#{@hub}' { send-keys C-Space s } \
       { run-shell -b \
         "$HOME/code/seabbs/dotfiles/scripts/sessionizer.sh --switch-popup '#{session_name}'" }

# Last session / window
bind \\ switch-client -l
bind / last-window

# New window in current path
bind c new-window -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# Pane operations
# -----------------------------------------------------------------------------

# Standard dev layout (nvim | ai / repl)
bind D split-window -h -c "#{pane_current_path}" \; \
       split-window -v -c "#{pane_current_path}" \; \
       select-pane -t 0

# Zoom current pane
bind z resize-pane -Z

# Clear focused pane (keeps scrollback)
bind e send-keys "clear" \; send-keys "Enter"

# Kill pane (restore tmux default with confirmation prompt)
unbind x
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane

# Swap current pane with the next one
bind X swap-pane -D

# Break pane to new window
bind b break-pane

# Join pane from another window
bind M choose-window "join-pane -s '%%'"

# -----------------------------------------------------------------------------
# Popups
# -----------------------------------------------------------------------------

# GitHub dashboard (global)
# GHD_CLIENT carries the client that opened the popup so gh-dash keybindings
# (proj/agent) can switch-client it behind the popup instead of nesting.
# tmux only format-expands -d, not the command, so resolve the tty at runtime.
bind G display-popup -E -w 90% -h 80% -d ~ \
       "GHD_CLIENT=$(tmux display-message -p '#{client_tty}') \
        GH_TOKEN=$(gh auth token --user seabbs) gh dash"

# GitHub dashboard (current repo)
bind g display-popup -E -w 90% -h 80% -d "#{pane_current_path}" \
       "GHD_CLIENT=$(tmux display-message -p '#{client_tty}') \
        GH_TOKEN=$(gh auth token --user seabbs) gh dash"

# System monitor (-> archie in a hub: monitor the box you're looking at)
bind T if-shell -F '#{@hub}' { send-keys C-Space T } \
       { display-popup -E -w 80% -h 70% "btop" }

# Taskwarrior (interactive TUI; shimmed so `task` resolves to Taskwarrior)
bind C-t display-popup -E -w 80% -h 80% \
       "$HOME/code/seabbs/dotfiles/scripts/taskwarrior-tui.sh"

# Quick scratch terminal (-> archie in a hub)
bind t if-shell -F '#{@hub}' { send-keys C-Space t } \
       { display-popup -E -w 60% -h 50% }

# AI agent (ephemeral, current directory; -> archie in a hub, in archie's path)
bind A if-shell -F '#{@hub}' { send-keys C-Space A } \
       { display-popup -E -w 90% -h 80% -d "#{pane_current_path}" claude }

# AI session switcher (list running Claude instances)
bind a display-popup -E -w 70% -h 60% \
       "$HOME/code/seabbs/dotfiles/scripts/agent-sessions.sh"

# Lazygit (current directory; -> archie in a hub, on archie's checkout)
bind C-g if-shell -F '#{@hub}' { send-keys C-Space C-g } \
         { display-popup -E -w 85% -h 75% -d "#{pane_current_path}" lazygit }

# Cheatsheet
bind C-h display-popup -E -w 70% -h 80% \
       "less ~/code/seabbs/dotfiles/tmux/cheatsheet.txt"

# REPL history search popup (Ctrl+Shift+R, no prefix)
bind -n C-S-r display-popup -E -w 70% -h 60% \
       "$HOME/code/seabbs/dotfiles/scripts/repl-history.sh"

# -----------------------------------------------------------------------------
# Copy mode (vim-style)
# -----------------------------------------------------------------------------

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
