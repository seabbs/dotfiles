# =============================================================================
# tmux configuration
# =============================================================================

# -----------------------------------------------------------------------------
# General settings
# -----------------------------------------------------------------------------

# True colour support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# OSC 52 clipboard (lets apps inside tmux write to system clipboard)
set -g set-clipboard on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Faster key repetition
set -s escape-time 0

# Focus events for auto-reload in nvim
set -g focus-events on

# Allow passthrough for Kitty graphics protocol (plots)
set -gq allow-passthrough on

# Stay in tmux when closing a session
set -g detach-on-destroy off

# Enable pane titles
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title} "

# -----------------------------------------------------------------------------
# Key bindings
# -----------------------------------------------------------------------------

# Prefix: Ctrl+Space (ergonomic, no clash with AeroSpace)
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# (Alt pane nav removed — Alt reserved for AeroSpace)

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation (prefix + number)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Switch sessions (prefix-based)
bind ( switch-client -p
bind ) switch-client -n

# Session picker popup (fzf)
bind f display-popup -E -w 60% -h 60% \
       "$HOME/code/seabbs/dotfiles/scripts/sessionizer.sh"

# Last session (quick toggle)
bind \\ switch-client -l

# Last window (quick toggle)
bind / last-window

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Create standard dev layout (nvim | happy / repl)
bind D split-window -h -c "#{pane_current_path}" \; \
       split-window -v -c "#{pane_current_path}" \; \
       select-pane -t 0

# Zoom current pane
bind z resize-pane -Z

# Break pane to new window
bind b break-pane

# Join pane from another window
bind J choose-window "join-pane -s '%%'"

# GitHub dashboard popup (global view)
bind G display-popup -E -w 90% -h 80% -d ~ \
       "GH_TOKEN=$(gh auth token --user seabbs) gh dash"

# GitHub dashboard popup (current repo)
bind g display-popup -E -w 90% -h 80% -d "#{pane_current_path}" \
       "GH_TOKEN=$(gh auth token --user seabbs) gh dash"

# System monitor popup
bind T display-popup -E -w 80% -h 70% "btop"

# Quick scratch terminal popup
bind t display-popup -E -w 60% -h 50%

# AI agent popup (ephemeral, in current directory)
bind A display-popup -E -w 90% -h 80% -d "#{pane_current_path}" claude

# Lazygit popup (current directory)
bind C-g display-popup -E -w 85% -h 75% -d "#{pane_current_path}" lazygit

# Cheatsheet popup (Ctrl-b Ctrl-h)
bind C-h display-popup -E -w 70% -h 80% \
       "less ~/code/seabbs/dotfiles/tmux/cheatsheet.txt"

# -----------------------------------------------------------------------------
# Copy mode (vim-style)
# -----------------------------------------------------------------------------

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# -----------------------------------------------------------------------------
# Status bar
# -----------------------------------------------------------------------------

set -g status-position top
set -g status-interval 5

# Colours (tokyonight night)
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g window-status-current-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g window-status-style "bg=#1a1b26,fg=#565f89"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#9ece6a,bold][#S] "

# Right: nothing (keep it minimal)
set -g status-right ""

# Window format
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# -----------------------------------------------------------------------------
# Plugins (TPM)
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'laktak/extrakto'

# fzf-url: prefix + u to pick URLs from the pane
set -g @fzf-url-history-limit '9999'

# resurrect: prefix + C-s to save, prefix + C-r to restore
set -g @resurrect-capture-pane-contents 'on'

# continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'

# extrakto: prefix + tab to fuzzy-pick any text from the pane
set -g @extrakto_clip_tool 'pbcopy'

# Initialise TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
