# =============================================================================
# tmux configuration
# =============================================================================
# Options, styling, and plugins live here.
# All keybindings live in tmux.reset.conf (sourced below).

# -----------------------------------------------------------------------------
# General settings
# -----------------------------------------------------------------------------

# True colour support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# OSC 52 clipboard (lets apps inside tmux write to system clipboard)
set -g set-clipboard on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Faster key repetition
set -s escape-time 0

# Focus events for auto-reload in nvim
set -g focus-events on

# Allow passthrough for Kitty graphics protocol (plots)
set -gq allow-passthrough on

# Propagate TERM_PROGRAM so MuxDisplay can identify the terminal inside tmux
set -ag update-environment "TERM_PROGRAM"

# Stay in tmux when closing a session
set -g detach-on-destroy off

# Put the host in the terminal title bar so it is obvious which machine
# a session is on (e.g. local mac vs the remote agents hub over SSH)
set -g set-titles on
set -g set-titles-string "#{?#{==:#h,archie},archie,home}  #S:#I #W"

# Enable pane titles
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title} "

# Prefix: Ctrl+Space (ergonomic, no clash with AeroSpace)
set -g prefix C-Space

# Vi-style copy mode and command prompt
setw -g mode-keys vi
set -g status-keys vi

# -----------------------------------------------------------------------------
# Keybindings (separate file for clarity)
# -----------------------------------------------------------------------------

source-file "$HOME/code/seabbs/dotfiles/tmux/tmux.reset.conf"

# -----------------------------------------------------------------------------
# Nested sessions (ssh/mosh into a remote tmux from inside this one)
# -----------------------------------------------------------------------------
# F12 toggles this (outer) tmux dormant so every key, including the C-Space
# prefix, passes straight through to the inner remote session. The status bar
# dims while dormant. Press F12 again to wake the outer tmux back up.
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "bg=#181926,fg=#6e738d" \;\
  set window-status-current-style "bg=#363a4f,fg=#8087a2" \;\
  refresh-client -S
bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-style \;\
  refresh-client -S

# prefix + R: flip between this machine (home) and a dedicated "archie"
# session holding a mosh connection, like switching tmux sessions. Press
# again from archie to jump back. (a/A are the AI session/claude popups.)
bind R run-shell "$HOME/code/seabbs/dotfiles/scripts/tmux-archie.sh"

# -----------------------------------------------------------------------------
# Status bar
# -----------------------------------------------------------------------------

set -g status-position top
set -g status-interval 5

# Colours (catppuccin macchiato)
set -g status-style "bg=#24273a,fg=#cad3f5"
set -g window-status-current-style "bg=#8aadf4,fg=#24273a,bold"
set -g window-status-style "bg=#24273a,fg=#6e738d"
set -g pane-border-style "fg=#494d64"
set -g pane-active-border-style "fg=#8aadf4"

# Left: host then session name (host in peach to flag the machine).
# Show a friendly label instead of the raw hostname (archie stays archie,
# everything else, e.g. the managed mac, shows "home").
set -g status-left-length 40
set -g status-left "#[fg=#f5a97f,bold][#{?#{==:#h,archie},archie,home}] #[fg=#a6da95,bold][#S] "

# Right: AI session monitor (▲ permission ● running ○ waiting)
set -g status-right-length 30
set -g status-right "#($HOME/code/seabbs/dotfiles/scripts/agent-sessions.sh --status)"

# Window format
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# -----------------------------------------------------------------------------
# Plugins (TPM)
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'omerxx/tmux-floax'

# floax: prefix + p toggles a floating popup terminal that persists
set -g @floax-bind 'p'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

# fzf-url: prefix + u to pick URLs from the pane
set -g @fzf-url-history-limit '9999'

# resurrect: prefix + C-s to save, prefix + C-r to restore
set -g @resurrect-capture-pane-contents 'on'

# continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'

# extrakto: prefix + tab to fuzzy-pick any text from the pane
set -g @extrakto_clip_tool 'pbcopy'

# Initialise TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
