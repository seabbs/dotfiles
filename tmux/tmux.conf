# =============================================================================
# tmux configuration
# =============================================================================
# Options, styling, and plugins live here.
# All keybindings live in tmux.reset.conf (sourced below).

# -----------------------------------------------------------------------------
# General settings
# -----------------------------------------------------------------------------

# Strip VS Code R extension env var so rstudioapi doesn't timeout in tmux
set-environment -gu RSTUDIOAPI_IPC_REQUESTS_FILE

# True colour support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# OSC 52 clipboard (lets apps inside tmux write to system clipboard)
set -g set-clipboard on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Faster key repetition
set -s escape-time 0

# Extended keys for Ctrl+Shift combos (e.g. the REPL history popup)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Focus events for auto-reload in nvim
set -g focus-events on

# Allow passthrough for Kitty graphics protocol (plots)
set -gq allow-passthrough on

# Propagate TERM_PROGRAM so MuxDisplay can identify the terminal inside tmux
set -ag update-environment "TERM_PROGRAM"

# Stay in tmux when closing a session
set -g detach-on-destroy off

# Put the host in the terminal title bar so it is obvious which machine
# a session is on (e.g. local mac vs the remote agents hub over SSH)
set -g set-titles on
set -g set-titles-string "#{?#{==:#h,archie},archie,home}  #S:#I #W"

# Enable pane titles
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title} "

# Prefix: Ctrl+Space (ergonomic, no clash with AeroSpace)
set -g prefix C-Space

# Vi-style copy mode and command prompt
setw -g mode-keys vi
set -g status-keys vi

# -----------------------------------------------------------------------------
# Keybindings (separate file for clarity)
# -----------------------------------------------------------------------------

source-file "$HOME/code/seabbs/dotfiles/tmux/tmux.reset.conf"

# -----------------------------------------------------------------------------
# Nested hub sessions (mosh into a remote tmux from inside this one)
# -----------------------------------------------------------------------------
# A "hub" session (the archie mosh session, flagged @hub) is a mac tmux session
# whose single pane runs mosh into archie's tmux. Rule: a few keys stay HOME
# because they only make sense on the mac, and EVERY OTHER prefix key drives
# archie. Home keys: f / a (finders — only the mac reaches both machines),
# g / G (gh-dash — mac's gh auth), C-t (taskwarrior — db on the mac), C-h
# (cheatsheet — static). Those keep their plain bindings from reset.conf.
#
# Forwarding lives in two places: window/pane/session keys are overridden below;
# the popup keys (T, t, A, C-g) and the window switcher (s) carry their own
# `if-shell @hub { send-keys ... } { <popup> }` guard inline in reset.conf, so
# each popup is defined once and self-routes (on archie @hub is never set, so it
# just runs locally). When @hub is set the keystroke is forwarded to the inner
# tmux, which runs the same config and does the work. Reach anything not listed
# by pressing the prefix twice (send-prefix). alt-f / alt-a / alt-g also work.
#
# NOTE: to reload, always `source-file ~/.tmux.conf` (never reset.conf alone) —
# the overrides below layer on top of reset.conf and are lost if it is sourced
# by itself.

# Window navigation -> archie when in a hub
bind 1 if-shell -F '#{@hub}' 'send-keys C-Space 1' 'select-window -t 1'
bind 2 if-shell -F '#{@hub}' 'send-keys C-Space 2' 'select-window -t 2'
bind 3 if-shell -F '#{@hub}' 'send-keys C-Space 3' 'select-window -t 3'
bind 4 if-shell -F '#{@hub}' 'send-keys C-Space 4' 'select-window -t 4'
bind 5 if-shell -F '#{@hub}' 'send-keys C-Space 5' 'select-window -t 5'
bind 6 if-shell -F '#{@hub}' 'send-keys C-Space 6' 'select-window -t 6'
bind 7 if-shell -F '#{@hub}' 'send-keys C-Space 7' 'select-window -t 7'
bind 8 if-shell -F '#{@hub}' 'send-keys C-Space 8' 'select-window -t 8'
bind 9 if-shell -F '#{@hub}' 'send-keys C-Space 9' 'select-window -t 9'
bind n if-shell -F '#{@hub}' 'send-keys C-Space n' 'next-window'
bind p if-shell -F '#{@hub}' 'send-keys C-Space p' 'previous-window'

# New window / splits / zoom / kill -> archie when in a hub
bind c if-shell -F '#{@hub}' 'send-keys C-Space c' \
       'new-window -c "#{pane_current_path}"'
bind | if-shell -F '#{@hub}' 'send-keys C-Space |' \
       'split-window -h -c "#{pane_current_path}"'
bind - if-shell -F '#{@hub}' 'send-keys C-Space -' \
       'split-window -v -c "#{pane_current_path}"'
bind z if-shell -F '#{@hub}' 'send-keys C-Space z' 'resize-pane -Z'
bind x if-shell -F '#{@hub}' 'send-keys C-Space x' \
       'confirm-before -p "kill-pane #P? (y/n)" kill-pane'

# Prefix-based pane navigation / copy-mode / last-window -> archie when in a hub
bind h if-shell -F '#{@hub}' 'send-keys C-Space h' 'select-pane -L'
bind j if-shell -F '#{@hub}' 'send-keys C-Space j' 'select-pane -D'
bind k if-shell -F '#{@hub}' 'send-keys C-Space k' 'select-pane -U'
bind l if-shell -F '#{@hub}' 'send-keys C-Space l' 'select-pane -R'
bind [ if-shell -F '#{@hub}' 'send-keys C-Space [' 'copy-mode'
bind / if-shell -F '#{@hub}' 'send-keys C-Space /' 'last-window'

# -----------------------------------------------------------------------------
# Status bar
# -----------------------------------------------------------------------------

set -g status-position top
set -g status-interval 5

# Colours (catppuccin macchiato)
set -g status-style "bg=#24273a,fg=#cad3f5"
set -g window-status-current-style "bg=#8aadf4,fg=#24273a,bold"
set -g window-status-style "bg=#24273a,fg=#6e738d"
set -g pane-border-style "fg=#494d64"
set -g pane-active-border-style "fg=#8aadf4"

# Left: host then session name (host in peach to flag the machine).
# Show a friendly label instead of the raw hostname (archie stays archie,
# everything else, e.g. the managed mac, shows "home").
set -g status-left-length 40
set -g status-left "#[fg=#f5a97f,bold][#{?#{==:#h,archie},archie,home}] #[fg=#a6da95,bold][#S] "

# Right: archie agents (shown only when there is remote activity) then the
# local AI session monitor (▲ permission ● running ○ waiting)
set -g status-right-length 200
set -g status-right "#($HOME/code/seabbs/dotfiles/scripts/archie-agent-status.sh)#($HOME/code/seabbs/dotfiles/scripts/local-agent-status.sh)"

# Window format
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# -----------------------------------------------------------------------------
# Plugins (TPM)
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'omerxx/tmux-floax'

# floax: prefix + o toggles a floating popup terminal that persists (prefix + O
# opens its menu). Moved off p so prefix + p is previous-window (see below).
set -g @floax-bind 'o'
# (prefix p = previous-window is set above, with hub-forwarding)
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

# fzf-url: prefix + u to pick URLs from the pane
set -g @fzf-url-history-limit '9999'

# resurrect: prefix + C-s to save, prefix + C-r to restore
set -g @resurrect-capture-pane-contents 'on'

# continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'

# After a reboot, continuum restores EVERY session — including the ephemeral
# archie hub gateway, which comes back as a dead husk (its mosh pane and @hub
# flag are runtime-only state resurrect can't capture). Left in place it masks
# archie in prefix+f and misroutes you into a dead local shell. This hook drops
# hub gateways once restore finishes, so the finder rebuilds a live one on
# demand. (eval'd by resurrect's execute_hook; no-op on archie itself.)
set -g @resurrect-hook-post-restore-all \
  '$HOME/code/seabbs/dotfiles/scripts/sessionizer.sh --drop-hub-gateways'

# extrakto: prefix + tab to fuzzy-pick any text from the pane
set -g @extrakto_clip_tool 'pbcopy'

# Initialise TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
